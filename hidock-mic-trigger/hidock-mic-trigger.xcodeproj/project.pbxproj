			shellScript = "if [ \"$CONFIGURATION\" = \"Release\" ]; then\n  APP_NAME=\"HiDock Mic Trigger.app\"\n  INSTALL_DIR=\"/Applications\"\n  BUILT_APP=\"$BUILT_PRODUCTS_DIR/$APP_NAME\"\n\n  if [ -d \"$BUILT_APP\" ]; then\n    # Kill running instance\n    pkill -f \"hidock-mic-trigger\" 2>/dev/null || true\n    sleep 1\n\n    # Remove any stale copies\n    rm -rf \"$INSTALL_DIR/$APP_NAME\"\n    rm -rf \"$INSTALL_DIR/hidock-mic-trigger.app\"\n    rm -rf \"$HOME/Applications/$APP_NAME\"\n\n    # Install fresh build and re-sign\n    cp -R \"$BUILT_APP\" \"$INSTALL_DIR/$APP_NAME\"\n    codesign --force --sign - \"$INSTALL_DIR/$APP_NAME\"\n\n    # Relaunch\n    open -a \"$INSTALL_DIR/$APP_NAME\"\n    echo \"Deployed $APP_NAME to $INSTALL_DIR\"\n  else\n    echo \"warning: Built app not found at $BUILT_APP\"\n  fi\nelif [ \"$CONFIGURATION\" = \"Debug\" ]; then\n  # Debug builds deploy to ~/Applications as a separate dev app\n  DEV_NAME=\"HiDock Mic Trigger Dev.app\"\n  DEV_DIR=\"$HOME/Applications\"\n  # Find the .app in the build output (name varies by config)\n  BUILT_APP=$(find \"$BUILT_PRODUCTS_DIR\" -maxdepth 1 -name \"*.app\" -type d | head -1)\n\n  if [ -n \"$BUILT_APP\" ] && [ -d \"$BUILT_APP\" ]; then\n    mkdir -p \"$DEV_DIR\"\n    # Kill dev instance only (match by Dev.app path)\n    pkill -f \"HiDock Mic Trigger Dev.app\" 2>/dev/null || true\n    sleep 1\n\n    rm -rf \"$DEV_DIR/$DEV_NAME\"\n    cp -R \"$BUILT_APP\" \"$DEV_DIR/$DEV_NAME\"\n    codesign --force --sign - \"$DEV_DIR/$DEV_NAME\"\n\n    open -a \"$DEV_DIR/$DEV_NAME\"\n    echo \"Deployed dev build to $DEV_DIR/$DEV_NAME\"\n  else\n    echo \"warning: Built app not found at $BUILT_APP\"\n  fi\nfi\n";
