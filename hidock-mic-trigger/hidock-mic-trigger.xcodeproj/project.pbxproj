			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/sh;
			shellScript = "set -euo pipefail\n\n# GitHub Actions is genuinely headless, so it must not attempt a\n# native dialog. A local validation build may also set CI=true to\n# suppress deployment; it still requires an explicit build approval.\nIS_GITHUB_CI=\"${GITHUB_ACTIONS:-}\"\nLOCAL_NON_DEPLOYING=\"false\"\nif [ \"${CI:-}\" = \"true\" ] && [ \"$IS_GITHUB_CI\" != \"true\" ]; then\n  LOCAL_NON_DEPLOYING=\"true\"\nfi\nif [ \"$IS_GITHUB_CI\" = \"true\" ]; then\n  echo \"note: Skipping build approval and deployment on GitHub Actions\"\n  exit 0\nfi\n\nif [ \"$LOCAL_NON_DEPLOYING\" = \"true\" ]; then\n  BUILD_APPROVED=$(/usr/bin/osascript \\\n    -e 'display dialog \"A local HiDock validation build is ready to run. Deployment is disabled for this build, but the build may still interrupt active work if it is already using the app.\" buttons {\"Decline\", \"Approve Build\"} default button \"Decline\" cancel button \"Decline\" with title \"Approve HiDock rebuild\"' \\\n    -e 'button returned of the result' 2>/dev/null || true)\n  if [ \"$BUILD_APPROVED\" != \"Approve Build\" ]; then\n    echo \"note: Local build approval declined; deployment remains disabled\"\n    exit 0\n  fi\n  echo \"note: Local build approved; deployment remains disabled (CI=true)\"\nelse\n  # Local builds replace the installed app, terminate the running\n  # process, and can interrupt recording/transcription. Cancel is\n  # the safe default.\n  DEPLOY_APPROVED=$(/usr/bin/osascript \\\n    -e 'display dialog \"A HiDock build is ready to replace the installed app and relaunch it. This will close the current app and may interrupt active work.\" buttons {\"Cancel\", \"Replace App\"} default button \"Cancel\" cancel button \"Cancel\" with title \"Approve HiDock app replacement\"' \\\n    -e 'button returned of the result' 2>/dev/null || true)\n  if [ \"$DEPLOY_APPROVED\" != \"Replace App\" ]; then\n    echo \"note: Deployment cancelled; the installed app was not changed\"\n    exit 0\n  fi\nfi\n\n# CI=true local validation builds stop after the approval above.\nif [ \"${CI:-}\" = \"true\" ]; then\n  exit 0\nfi\n\nAPP_NAME=\"HiDock Mic Trigger.app\"\nINSTALL_DIR=\"/Applications\"\n# Build output name may differ from the install name; find the .app.\nBUILT_APP=$(find \"$BUILT_PRODUCTS_DIR\" -maxdepth 1 -name \"*.app\" -type d | head -1)\n\nif [ -z \"$BUILT_APP\" ] || [ ! -d \"$BUILT_APP\" ]; then\n  echo \"error: Built app not found under $BUILT_PRODUCTS_DIR\"\n  exit 1\nfi\n\n# A stable Developer ID identity is required for local installs.\n# Ad-hoc signing changes the designated requirement on every build,\n# so Keychain \"Always Allow\" approvals cannot persist.\nSIGN_ID=\"${HIDOCK_SIGNING_IDENTITY:-}\"\nif [ -z \"$SIGN_ID\" ]; then\n  SIGN_ID=$(security find-identity -v -p codesigning 2>/dev/null \\\n    | awk -F'\"' '/Developer ID Application:/ {print $2; exit}')\nfi\ncase \"$SIGN_ID\" in\n  \"Developer ID Application:\"*) ;;\n  *)\n    echo \"error: no valid Developer ID Application identity found\"\n    echo \"       Install the certificate/private key or set HIDOCK_SIGNING_IDENTITY.\"\n    exit 1\n    ;;\nesac\n\n# Sign and verify a staged copy before replacing the live app. A\n# failed signing operation must not leave an unsigned/broken install.\nSTAGE_DIR=$(mktemp -d \"${TMPDIR:-/tmp}/hidock-install.XXXXXX\")\ntrap 'rm -rf \"$STAGE_DIR\"' EXIT\nSTAGED_APP=\"$STAGE_DIR/$APP_NAME\"\ncp -R \"$BUILT_APP\" \"$STAGED_APP\"\necho \"Signing with: $SIGN_ID\"\ncodesign --force --deep --sign \"$SIGN_ID\" \"$STAGED_APP\"\ncodesign --verify --deep --strict --verbose=2 \"$STAGED_APP\"\n\n# Kill running instance only after the replacement has been signed.\npkill -f \"hidock-mic-trigger\" 2>/dev/null || true\nsleep 1\n\n# Remove stale copies (including the legacy Dev.app split, the old\n# lowercase bundle name, and the old per-user install location).\nrm -rf \"$INSTALL_DIR/$APP_NAME\"\nrm -rf \"$INSTALL_DIR/HiDock Mic Trigger Dev.app\"\nrm -rf \"$INSTALL_DIR/hidock-mic-trigger.app\"\nrm -rf \"$HOME/Applications/$APP_NAME\"\nrm -rf \"$HOME/Applications/HiDock Mic Trigger Dev.app\"\n\ncp -R \"$STAGED_APP\" \"$INSTALL_DIR/$APP_NAME\"\ncodesign --verify --deep --strict --verbose=2 \"$INSTALL_DIR/$APP_NAME\"\n/System/Library/Frameworks/CoreServices.framework/Versions/Current/Frameworks/LaunchServices.framework/Versions/Current/Support/lsregister -f \"$INSTALL_DIR/$APP_NAME\"\n\nopen -a \"$INSTALL_DIR/$APP_NAME\"\necho \"Deployed signed $APP_NAME ($CONFIGURATION) to $INSTALL_DIR\"\n";
		};
