name: hidock-mic-trigger
options:
  bundleIdPrefix: com.hidock.tools
  deploymentTarget:
    macOS: 13.0
settings:
  MARKETING_VERSION: 1.0.0
  CURRENT_PROJECT_VERSION: 1
packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: 1.13.0
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: 2.4.0
schemes:
  hidock-mic-trigger:
    build:
      targets:
        hidock-mic-trigger: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - hidock-mic-trigger-tests
targets:
  hidock-mic-trigger:
    type: application
    platform: macOS
    dependencies:
      - package: SwiftTerm
      - package: MarkdownUI
        product: MarkdownUI
    preBuildScripts:
      - name: "Run Python Tests"
        script: |
          cd "$SRCROOT/../usb-extractor"
          if [ -f ".venv/bin/python" ]; then
            .venv/bin/python -m pytest tests/ --tb=short -q
          else
            echo "warning: Python venv not found, skipping extractor tests"
          fi
          cd "$SRCROOT/../transcription-pipeline"
          if [ -f ".venv/bin/python" ]; then
            .venv/bin/python -m pytest tests/ --tb=short -q
          else
            echo "warning: transcription-pipeline venv not found, skipping tests"
          fi
        basedOnDependencyAnalysis: false
    postBuildScripts:
      - name: "Deploy to Applications"
        script: |
          # Skip deploy on CI (GitHub Actions sets CI=true)
          if [ "$CI" = "true" ]; then
            echo "note: Skipping deploy on CI"
            exit 0
          fi

          APP_NAME="HiDock Mic Trigger.app"
          INSTALL_DIR="/Applications"
          # Build output name may differ from the install name; find the .app.
          BUILT_APP=$(find "$BUILT_PRODUCTS_DIR" -maxdepth 1 -name "*.app" -type d | head -1)

          if [ -z "$BUILT_APP" ] || [ ! -d "$BUILT_APP" ]; then
            echo "warning: Built app not found under $BUILT_PRODUCTS_DIR"
            exit 0
          fi

          # Kill running instance
          pkill -f "hidock-mic-trigger" 2>/dev/null || true
          sleep 1

          # Remove stale copies (including the legacy Dev.app split and the
          # old lowercase bundle name, neither of which we ship any more).
          rm -rf "$INSTALL_DIR/$APP_NAME"
          rm -rf "$INSTALL_DIR/HiDock Mic Trigger Dev.app"
          rm -rf "$INSTALL_DIR/hidock-mic-trigger.app"
          rm -rf "$HOME/Applications/$APP_NAME"
          rm -rf "$HOME/Applications/HiDock Mic Trigger Dev.app"

          # Install fresh build and re-sign.
          cp -R "$BUILT_APP" "$INSTALL_DIR/$APP_NAME"
          # Prefer a stable Developer ID identity: ad-hoc ("-") produces a
          # different code signature every build, so macOS treats the app as
          # new each time and re-prompts for keychain access ("Always Allow"
          # never sticks). A Developer ID identity has a stable designated
          # requirement, so keychain trust persists across rebuilds.
          # Falls back to ad-hoc when no cert is present (CI / other machines).
          SIGN_ID=$(security find-identity -v -p codesigning 2>/dev/null | grep "Developer ID Application" | head -1 | sed -E 's/.*"(.*)".*/\1/')
          if [ -n "$SIGN_ID" ]; then
            echo "Signing with: $SIGN_ID"
            codesign --force --deep --sign "$SIGN_ID" "$INSTALL_DIR/$APP_NAME"
          else
            echo "No Developer ID cert found — signing ad-hoc (keychain may re-prompt each build)"
            codesign --force --deep --sign - "$INSTALL_DIR/$APP_NAME"
          fi
          /System/Library/Frameworks/CoreServices.framework/Versions/Current/Frameworks/LaunchServices.framework/Versions/Current/Support/lsregister -f "$INSTALL_DIR/$APP_NAME"

          open -a "$INSTALL_DIR/$APP_NAME"
          echo "Deployed $APP_NAME ($CONFIGURATION) to $INSTALL_DIR"
        basedOnDependencyAnalysis: false
    sources:
      - Sources
      - Assets.xcassets
    settings:
      INFOPLIST_KEY_LSUIElement: YES
      INFOPLIST_KEY_NSMicrophoneUsageDescription: "This app launches hidock-mic-trigger to keep the HiDock mic active when your USB mic is in use."
      PRODUCT_NAME: HiDock Mic Trigger
      EXECUTABLE_NAME: hidock-mic-trigger
      # Debug and Release share bundle id, icon, and install location so there
      # is only ever one "HiDock Mic Trigger.app" on the machine. Debug still
      # gets the DEBUG compile flag (standard for SwiftUI #if DEBUG checks).
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      PRODUCT_BUNDLE_IDENTIFIER: com.hidock.tools.hidock-mic-trigger
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    info:
      path: Info.plist
      properties:
        CFBundleName: HiDock Mic Trigger
        CFBundleDisplayName: HiDock Mic Trigger
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleExecutable: hidock-mic-trigger
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSUIElement: true
        NSMicrophoneUsageDescription: "This app launches hidock-mic-trigger to keep the HiDock mic active when your USB mic is in use."
  hidock-mic-trigger-tests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
    dependencies:
      - target: hidock-mic-trigger
    # Host-less logic tests. macOS unit tests can @testable import the app
    # target without a running host app; a TEST_HOST pointing at the agent
    # app (LSUIElement) made `xcodebuild test` fail to resolve the host.
    settings:
      GENERATE_INFOPLIST_FILE: YES
