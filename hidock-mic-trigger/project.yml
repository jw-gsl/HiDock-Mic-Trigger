name: hidock-mic-trigger
options:
  bundleIdPrefix: com.hidock.tools
  deploymentTarget:
    macOS: 13.0
settings:
  MARKETING_VERSION: 1.0.0
  CURRENT_PROJECT_VERSION: 1
packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: 1.13.0
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: 2.4.0
schemes:
  hidock-mic-trigger:
    build:
      targets:
        hidock-mic-trigger: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - hidock-mic-trigger-tests
targets:
  hidock-mic-trigger:
    type: application
    platform: macOS
    dependencies:
      - package: SwiftTerm
      - package: MarkdownUI
        product: MarkdownUI
    preBuildScripts:
      - name: "Run Python Tests"
        script: |
          cd "$SRCROOT/../usb-extractor"
          if [ -f ".venv/bin/python" ]; then
            .venv/bin/python -m pytest tests/ --tb=short -q
          else
            echo "warning: Python venv not found, skipping extractor tests"
          fi
          cd "$SRCROOT/../transcription-pipeline"
          if [ -f ".venv/bin/python" ]; then
            .venv/bin/python -m pytest tests/ --tb=short -q
          else
            echo "warning: transcription-pipeline venv not found, skipping tests"
          fi
        basedOnDependencyAnalysis: false
    postBuildScripts:
      - name: "Deploy to Applications"
        script: |
          set -euo pipefail

          # GitHub Actions is genuinely headless, so it must not attempt a
          # native dialog. A local validation build may also set CI=true to
          # suppress deployment; it still requires an explicit build approval.
          IS_GITHUB_CI="${GITHUB_ACTIONS:-}"
          LOCAL_NON_DEPLOYING="false"
          if [ "${CI:-}" = "true" ] && [ "$IS_GITHUB_CI" != "true" ]; then
            LOCAL_NON_DEPLOYING="true"
          fi
          if [ "$IS_GITHUB_CI" = "true" ]; then
            echo "note: Skipping build approval and deployment on GitHub Actions"
            exit 0
          fi

          if [ "$LOCAL_NON_DEPLOYING" = "true" ]; then
            BUILD_APPROVED=$(/usr/bin/osascript \
              -e 'display dialog "A local HiDock validation build is ready to run. Deployment is disabled for this build, but the build may still interrupt active work if it is already using the app." buttons {"Decline", "Approve Build"} default button "Decline" cancel button "Decline" with title "Approve HiDock rebuild"' \
              -e 'button returned of the result' 2>/dev/null || true)
            if [ "$BUILD_APPROVED" != "Approve Build" ]; then
              echo "note: Local build approval declined; deployment remains disabled"
              exit 0
            fi
            echo "note: Local build approved; deployment remains disabled (CI=true)"
          else
            # Local builds replace the installed app, terminate the running
            # process, and can interrupt recording/transcription. Cancel is
            # the safe default.
            DEPLOY_APPROVED=$(/usr/bin/osascript \
              -e 'display dialog "A HiDock build is ready to replace the installed app and relaunch it. This will close the current app and may interrupt active work." buttons {"Cancel", "Replace App"} default button "Cancel" cancel button "Cancel" with title "Approve HiDock app replacement"' \
              -e 'button returned of the result' 2>/dev/null || true)
            if [ "$DEPLOY_APPROVED" != "Replace App" ]; then
              echo "note: Deployment cancelled; the installed app was not changed"
              exit 0
            fi
          fi

          # CI=true local validation builds stop after the approval above.
          if [ "${CI:-}" = "true" ]; then
            exit 0
          fi

          APP_NAME="HiDock Mic Trigger.app"
          INSTALL_DIR="/Applications"
          # Build output name may differ from the install name; find the .app.
          BUILT_APP=$(find "$BUILT_PRODUCTS_DIR" -maxdepth 1 -name "*.app" -type d | head -1)

          if [ -z "$BUILT_APP" ] || [ ! -d "$BUILT_APP" ]; then
            echo "error: Built app not found under $BUILT_PRODUCTS_DIR"
            exit 1
          fi

          # A stable Developer ID identity is required for local installs.
          # Ad-hoc signing changes the designated requirement on every build,
          # so Keychain "Always Allow" approvals cannot persist.
          SIGN_ID="${HIDOCK_SIGNING_IDENTITY:-}"
          if [ -z "$SIGN_ID" ]; then
            SIGN_ID=$(security find-identity -v -p codesigning 2>/dev/null \
              | awk -F'"' '/Developer ID Application:/ {print $2; exit}')
          fi
          case "$SIGN_ID" in
            "Developer ID Application:"*) ;;
            *)
              echo "error: no valid Developer ID Application identity found"
              echo "       Install the certificate/private key or set HIDOCK_SIGNING_IDENTITY."
              exit 1
              ;;
          esac

          # Sign and verify a staged copy before replacing the live app. A
          # failed signing operation must not leave an unsigned/broken install.
          STAGE_DIR=$(mktemp -d "${TMPDIR:-/tmp}/hidock-install.XXXXXX")
          trap 'rm -rf "$STAGE_DIR"' EXIT
          STAGED_APP="$STAGE_DIR/$APP_NAME"
          cp -R "$BUILT_APP" "$STAGED_APP"
          echo "Signing with: $SIGN_ID"
          codesign --force --deep --sign "$SIGN_ID" "$STAGED_APP"
          codesign --verify --deep --strict --verbose=2 "$STAGED_APP"

          # Kill running instance only after the replacement has been signed.
          pkill -f "hidock-mic-trigger" 2>/dev/null || true
          sleep 1

          # Remove stale copies (including the legacy Dev.app split, the old
          # lowercase bundle name, and the old per-user install location).
          rm -rf "$INSTALL_DIR/$APP_NAME"
          rm -rf "$INSTALL_DIR/HiDock Mic Trigger Dev.app"
          rm -rf "$INSTALL_DIR/hidock-mic-trigger.app"
          rm -rf "$HOME/Applications/$APP_NAME"
          rm -rf "$HOME/Applications/HiDock Mic Trigger Dev.app"

          cp -R "$STAGED_APP" "$INSTALL_DIR/$APP_NAME"
          codesign --verify --deep --strict --verbose=2 "$INSTALL_DIR/$APP_NAME"
          /System/Library/Frameworks/CoreServices.framework/Versions/Current/Frameworks/LaunchServices.framework/Versions/Current/Support/lsregister -f "$INSTALL_DIR/$APP_NAME"

          open -a "$INSTALL_DIR/$APP_NAME"
          echo "Deployed signed $APP_NAME ($CONFIGURATION) to $INSTALL_DIR"
        basedOnDependencyAnalysis: false
    sources:
      - Sources
      - Assets.xcassets
    settings:
      INFOPLIST_KEY_LSUIElement: YES
      INFOPLIST_KEY_NSMicrophoneUsageDescription: "This app launches hidock-mic-trigger to keep the HiDock mic active when your USB mic is in use."
      PRODUCT_NAME: HiDock Mic Trigger
      EXECUTABLE_NAME: hidock-mic-trigger
      # Debug and Release share bundle id, icon, and install location so there
      # is only ever one "HiDock Mic Trigger.app" on the machine. Debug still
      # gets the DEBUG compile flag (standard for SwiftUI #if DEBUG checks).
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      PRODUCT_BUNDLE_IDENTIFIER: com.hidock.tools.hidock-mic-trigger
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    info:
      path: Info.plist
      properties:
        CFBundleName: HiDock Mic Trigger
        CFBundleDisplayName: HiDock Mic Trigger
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleExecutable: hidock-mic-trigger
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSUIElement: true
        NSMicrophoneUsageDescription: "This app launches hidock-mic-trigger to keep the HiDock mic active when your USB mic is in use."
  hidock-mic-trigger-tests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
    dependencies:
      - target: hidock-mic-trigger
    # Host-less logic tests. macOS unit tests can @testable import the app
    # target without a running host app; a TEST_HOST pointing at the agent
    # app (LSUIElement) made `xcodebuild test` fail to resolve the host.
    settings:
      GENERATE_INFOPLIST_FILE: YES
