name: Build macOS App

on:
  push:
    branches: [main]
    paths:
      - 'hidock-mic-trigger/**'
      - 'usb-extractor/extractor.py'
      - 'transcription-pipeline/**'
      - '.github/workflows/build-macos.yml'
  workflow_dispatch:

env:
  BUILD_DIR: /tmp/hidock-build/Build/Products/Release
  APP_NAME: "HiDock Mic Trigger.app"

jobs:
  build-app:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          cd hidock-mic-trigger
          xcodegen generate

      - name: Build Swift app
        run: |
          cd hidock-mic-trigger
          xcodebuild -project hidock-mic-trigger.xcodeproj \
            -scheme hidock-mic-trigger \
            -configuration Release \
            -derivedDataPath /tmp/hidock-build \
            -arch arm64

      - name: Locate and rename app bundle
        run: |
          # The build may produce "hidock-mic-trigger.app" or "HiDock Mic Trigger.app"
          # depending on Xcode version. Find whichever exists and rename to canonical name.
          FOUND=$(find "$BUILD_DIR" -maxdepth 1 -name "*.app" -type d | head -1)
          if [ -z "$FOUND" ]; then
            # Deploy script may have moved it to /Applications/
            if [ -d "/Applications/$APP_NAME" ]; then
              cp -R "/Applications/$APP_NAME" "$BUILD_DIR/$APP_NAME"
              FOUND="$BUILD_DIR/$APP_NAME"
            else
              echo "ERROR: No .app found in $BUILD_DIR or /Applications/"
              ls -la "$BUILD_DIR/" || true
              exit 1
            fi
          fi
          if [ "$(basename "$FOUND")" != "$APP_NAME" ]; then
            mv "$FOUND" "$BUILD_DIR/$APP_NAME"
          fi
          echo "App bundle: $BUILD_DIR/$APP_NAME"
          ls "$BUILD_DIR/$APP_NAME/Contents/MacOS/"

      - name: Prepare bundle resources
        run: |
          RES="$BUILD_DIR/$APP_NAME/Contents/Resources"

          mkdir -p "$RES/usb-extractor"
          cp usb-extractor/extractor.py "$RES/usb-extractor/"

          mkdir -p "$RES/transcription-pipeline"
          cp transcription-pipeline/transcribe_cpp.py "$RES/transcription-pipeline/"
          cp transcription-pipeline/transcribe.py "$RES/transcription-pipeline/"
          cp transcription-pipeline/config.py "$RES/transcription-pipeline/"
          cp transcription-pipeline/state.py "$RES/transcription-pipeline/"

          if [ -f "mic-trigger/hidock-mic-trigger" ]; then
            cp "mic-trigger/hidock-mic-trigger" "$RES/"
          fi

      - name: Create extractor venv
        run: |
          RES="$BUILD_DIR/$APP_NAME/Contents/Resources"
          python3.11 -m venv "$RES/usb-extractor/.venv"
          "$RES/usb-extractor/.venv/bin/pip" install --upgrade pip
          "$RES/usb-extractor/.venv/bin/pip" install pyusb libusb-package numpy

      - name: Create transcription venv
        run: |
          RES="$BUILD_DIR/$APP_NAME/Contents/Resources"
          python3.11 -m venv "$RES/transcription-pipeline/.venv"
          "$RES/transcription-pipeline/.venv/bin/pip" install --upgrade pip
          "$RES/transcription-pipeline/.venv/bin/pip" install pywhispercpp certifi

      - name: Make venvs relocatable
        run: |
          RES="$BUILD_DIR/$APP_NAME/Contents/Resources"
          PYTHON_BIN="$(python3.11 -c 'import sys; print(sys.executable)')"

          for VENV_DIR in "$RES/usb-extractor/.venv" "$RES/transcription-pipeline/.venv"; do
            rm -f "$VENV_DIR/bin/python3" "$VENV_DIR/bin/python3.11" "$VENV_DIR/bin/python"
            cp "$PYTHON_BIN" "$VENV_DIR/bin/python3"
            ln -sf python3 "$VENV_DIR/bin/python"
            sed -i '' "s|^home = .*|home = .|" "$VENV_DIR/pyvenv.cfg"
            find "$VENV_DIR/bin" -type f -exec \
              sed -i '' "1s|^#!.*python.*|#!/usr/bin/env python3|" {} \; 2>/dev/null || true
          done

      - name: Code sign bundle
        run: |
          APP="$BUILD_DIR/$APP_NAME"

          # Sign all nested binaries (inner to outer)
          find "$APP/Contents/Resources" -type f \( -name "*.dylib" -o -name "*.so" \) -exec \
            codesign --force --sign - {} \;
          find "$APP/Contents/Resources" -type f -name "python*" -path "*/bin/*" -exec \
            codesign --force --sign - {} \;
          find "$APP/Contents/MacOS" -type f -exec codesign --force --sign - {} \;

          # Sign the app bundle itself
          codesign --force --sign - "$APP"

      - name: Create distributable zip
        run: |
          cd "$BUILD_DIR"
          ditto -c -k --sequesterRsrc --keepParent "$APP_NAME" "HiDock-Mic-Trigger-macOS.zip"

      - name: Report bundle size
        run: |
          APP="$BUILD_DIR/$APP_NAME"
          echo "App bundle:"
          du -sh "$APP"
          du -sh "$APP/Contents/Resources/usb-extractor/.venv" || true
          du -sh "$APP/Contents/Resources/transcription-pipeline/.venv" || true
          echo "Zip:"
          ls -lh "$BUILD_DIR/HiDock-Mic-Trigger-macOS.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: HiDock-Mic-Trigger-macOS
          path: /tmp/hidock-build/Build/Products/Release/HiDock-Mic-Trigger-macOS.zip
          retention-days: 90
