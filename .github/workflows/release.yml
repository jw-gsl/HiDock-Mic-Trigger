name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: true
        type: string

jobs:
  run-tests:
    uses: ./.github/workflows/test.yml

  build-windows:
    needs: [run-tests]
    runs-on: windows-latest
    defaults:
      run:
        working-directory: Windows-App
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Inject feedback token
        env:
          FEEDBACK_TOKEN: ${{ secrets.FEEDBACK_TOKEN }}
        run: |
          if ($env:FEEDBACK_TOKEN) {
            Set-Content -Path "core/feedback_token.py" -Value "TOKEN = `"$env:FEEDBACK_TOKEN`""
          }
      - name: Build HiDock.exe
        run: pyinstaller hidock.spec --noconfirm
      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: Windows-App/dist/HiDock.exe

  build-macos:
    needs: [run-tests]
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate and build
        run: |
          cd hidock-mic-trigger
          xcodegen generate
          xcodebuild -project hidock-mic-trigger.xcodeproj \
            -scheme hidock-mic-trigger \
            -configuration Release \
            -derivedDataPath /tmp/hidock-build \
            -arch arm64
      - name: Locate app
        run: |
          FOUND=$(find /tmp/hidock-build/Build/Products/Release -maxdepth 1 -name "*.app" -type d | head -1)
          if [ "$(basename "$FOUND")" != "HiDock Mic Trigger.app" ]; then
            mv "$FOUND" "/tmp/hidock-build/Build/Products/Release/HiDock Mic Trigger.app"
          fi
      - name: Inject feedback token
        env:
          FEEDBACK_TOKEN: ${{ secrets.FEEDBACK_TOKEN }}
        run: |
          APP="/tmp/hidock-build/Build/Products/Release/HiDock Mic Trigger.app"
          RES="$APP/Contents/Resources"
          if [ -n "$FEEDBACK_TOKEN" ]; then
            echo "$FEEDBACK_TOKEN" > "$RES/feedback_token.txt"
          fi
      - name: Bundle Python venvs
        run: |
          APP="/tmp/hidock-build/Build/Products/Release/HiDock Mic Trigger.app"
          RES="$APP/Contents/Resources"

          mkdir -p "$RES/usb-extractor"
          cp usb-extractor/extractor.py "$RES/usb-extractor/"

          mkdir -p "$RES/transcription-pipeline"
          cp transcription-pipeline/transcribe_cpp.py "$RES/transcription-pipeline/"
          cp transcription-pipeline/transcribe.py "$RES/transcription-pipeline/"
          cp transcription-pipeline/config.py "$RES/transcription-pipeline/"
          cp transcription-pipeline/state.py "$RES/transcription-pipeline/"

          python3.11 -m venv "$RES/usb-extractor/.venv"
          "$RES/usb-extractor/.venv/bin/pip" install --upgrade pip
          "$RES/usb-extractor/.venv/bin/pip" install pyusb libusb-package numpy

          python3.11 -m venv "$RES/transcription-pipeline/.venv"
          "$RES/transcription-pipeline/.venv/bin/pip" install --upgrade pip
          "$RES/transcription-pipeline/.venv/bin/pip" install pywhispercpp certifi

          PYTHON_BIN="$(python3.11 -c 'import sys; print(sys.executable)')"
          for VENV_DIR in "$RES/usb-extractor/.venv" "$RES/transcription-pipeline/.venv"; do
            rm -f "$VENV_DIR/bin/python3" "$VENV_DIR/bin/python3.11" "$VENV_DIR/bin/python"
            cp "$PYTHON_BIN" "$VENV_DIR/bin/python3"
            ln -sf python3 "$VENV_DIR/bin/python"
            sed -i '' "s|^home = .*|home = .|" "$VENV_DIR/pyvenv.cfg"
            find "$VENV_DIR/bin" -type f -exec sed -i '' "1s|^#!.*python.*|#!/usr/bin/env python3|" {} \; 2>/dev/null || true
          done
      - name: Import Developer ID certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KP="$(uuidgen)"
          security create-keychain -p "$KP" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KP" build.keychain
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/devid.p12"
          security import "$RUNNER_TEMP/devid.p12" -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KP" build.keychain
          security list-keychains -d user -s build.keychain login.keychain
          rm -f "$RUNNER_TEMP/devid.p12"

      - name: Code sign (Developer ID), notarize, staple, zip
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          set -euo pipefail
          DIR="/tmp/hidock-build/Build/Products/Release"
          APP="$DIR/HiDock Mic Trigger.app"
          ENT="$GITHUB_WORKSPACE/hidock-mic-trigger/signing/entitlements.plist"
          OPTS=(--force --options runtime --timestamp --sign "$APPLE_SIGNING_IDENTITY")

          # Deep-sign inner → outer with the Developer ID. Libraries take no
          # entitlements; executables (Python, CLI, app) take the hardened-runtime
          # entitlements so the notarized app can load the bundled native libs.
          find "$APP/Contents/Resources" -type f \( -name "*.dylib" -o -name "*.so" \) \
            -exec codesign "${OPTS[@]}" {} \;
          find "$APP/Contents/Resources" -type f -name "python*" -path "*/bin/*" \
            -exec codesign "${OPTS[@]}" --entitlements "$ENT" {} \;
          if [ -d "$APP/Contents/Frameworks" ]; then
            find "$APP/Contents/Frameworks" -maxdepth 1 -name "*.framework" \
              -exec codesign "${OPTS[@]}" {} \; || true
          fi
          find "$APP/Contents/MacOS" -type f \
            -exec codesign "${OPTS[@]}" --entitlements "$ENT" {} \;
          codesign "${OPTS[@]}" --entitlements "$ENT" "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"

          # Notarize (App Store Connect API key), then staple the ticket.
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          ( cd "$DIR" && ditto -c -k --sequesterRsrc --keepParent "HiDock Mic Trigger.app" notarize.zip )
          xcrun notarytool submit "$DIR/notarize.zip" \
            --key "$RUNNER_TEMP/AuthKey.p8" --key-id "$APPLE_API_KEY" --issuer "$APPLE_API_ISSUER" --wait
          rm -f "$RUNNER_TEMP/AuthKey.p8" "$DIR/notarize.zip"
          xcrun stapler staple "$APP"
          spctl -a -t exec -vvv "$APP" || true

          # Zip the *stapled* app for distribution + the auto-updater.
          ( cd "$DIR" && ditto -c -k --sequesterRsrc --keepParent "HiDock Mic Trigger.app" "HiDock-Mic-Trigger-macOS.zip" )
      - uses: actions/upload-artifact@v4
        with:
          name: macos-zip
          path: /tmp/hidock-build/Build/Products/Release/HiDock-Mic-Trigger-macOS.zip

  create-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: macos-zip
          path: artifacts/
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: HiDock Tools ${{ github.event.inputs.version }}
          body: |
            ## Downloads

            | Platform | File |
            |----------|------|
            | **Windows** | `HiDock.exe` — double-click to run, no setup needed |
            | **macOS** | `HiDock-Mic-Trigger-macOS.zip` — extract and drag to Applications |

            The speech recognition model (~550 MB) is downloaded within the app on first use.
          files: |
            artifacts/HiDock.exe
            artifacts/HiDock-Mic-Trigger-macOS.zip
          draft: false
          prerelease: false
