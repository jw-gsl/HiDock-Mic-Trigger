name: Build Windows App

on:
  push:
    branches: [main]
    paths:
      - 'Windows-App/**'
  pull_request:
    paths:
      - 'Windows-App/**'
  workflow_dispatch:  # Manual trigger from GitHub UI

jobs:
  build-exe:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: Windows-App

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # pytest isn't a runtime dep — install separately for CI test step.
          pip install pytest

      - name: Inject feedback token
        env:
          FEEDBACK_TOKEN: ${{ secrets.FEEDBACK_TOKEN }}
        run: |
          if ($env:FEEDBACK_TOKEN) {
            Set-Content -Path "core/feedback_token.py" -Value "TOKEN = `"$env:FEEDBACK_TOKEN`""
            Write-Host "Feedback token injected"
          } else {
            Write-Host "Warning: FEEDBACK_TOKEN secret not set"
          }

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Build HiDock.exe
        run: pyinstaller hidock.spec --noconfirm

      - name: Verify build
        run: |
          if (Test-Path dist\HiDock.exe) {
            $size = (Get-Item dist\HiDock.exe).Length / 1MB
            Write-Host "Build successful: HiDock.exe ($([math]::Round($size, 1)) MB)"
          } else {
            Write-Error "Build failed - HiDock.exe not found"
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HiDock-Windows
          path: Windows-App/dist/HiDock.exe
          retention-days: 90
